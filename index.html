<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>iPad 代號計算器</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
      margin: 0; font-family: "Microsoft JhengHei", sans-serif; 
      background: #efefef; height: 100vh; overflow: hidden; 
    }
    
    .page { display: flex; flex-direction: column; height: 100vh; padding: 15px; gap: 15px; }

    /* 上段：代號與黑幕 (可滑動) */
    .top-section { display: grid; grid-template-columns: 450px 1fr; gap: 15px; flex: 1; min-height: 0; }

    .codes-container { overflow-y: auto; background: #fff; border-radius: 8px; padding: 10px; border: 1px solid #ccc; }
    .codes { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
    .codes button { height: 55px; font-size: 22px; border: 2px solid #333; border-radius: 10px; background: #fff; cursor: pointer; }

    .screen { 
      background: #000; color: #00ff41; padding: 20px; font-size: 28px; 
      border-radius: 8px; overflow-y: auto; white-space: pre-wrap;
    }

    /* 下段：計算盤與功能鈕 (固定) */
    .bottom-section { display: grid; grid-template-columns: 450px 1fr; gap: 15px; height: 320px; flex-shrink: 0; }

    .calc-grid { 
      display: grid; grid-template-columns: repeat(3, 1fr) 100px; grid-template-rows: repeat(4, 1fr);
      background: #bbb; gap: 1px; border: 2px solid #666;
    }
    .calc-grid button { border: none; background: #d9d9d9; font-size: 32px; font-weight: bold; cursor: pointer; }
    .calc-grid .wide-op { grid-column: 4; grid-row: span 2; background: #f39a18; color: white; }

    .action-grid { display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); gap: 10px; }
    .action-btn { background: #b5b5b5; border: none; border-radius: 8px; font-size: 24px; font-weight: 700; cursor: pointer; }
    .archive-btn { background: #e74c3c; color: white; }

    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 100;
    }
    .modal-content { background: #fff; padding: 25px; border-radius: 15px; width: 350px; text-align: center; }
    .modal-content input { width: 100%; padding: 10px; font-size: 20px; margin: 15px 0; }
  </style>
</head>
<body>

<div class="page">
  <div class="top-section">
    <div class="codes-container">
      <div class="codes" id="codeButtons"></div>
    </div>
    <div id="screen" class="screen"></div>
  </div>

  <div class="bottom-section">
    <div class="calc-grid">
      <button data-value="7">7</button><button data-value="8">8</button><button data-value="9">9</button>
      <button class="wide-op" data-action="plus">+</button>
      <button data-value="4">4</button><button data-value="5">5</button><button data-value="6">6</button>
      <button data-value="1">1</button><button data-value="2">2</button><button data-value="3">3</button>
      <button class="wide-op" data-action="equals">＝</button>
      <button data-action="backspace">←</button><button data-value="0">0</button><button data-value="00">00</button>
    </div>

    <div class="action-grid">
      <button class="action-btn" onclick="location.href='stats.html'">代號統計</button>
      <button class="action-btn" id="historyBtn">觀看記錄</button>
      <button class="action-btn" id="addCodeBtn">新增代號</button>
      <button class="action-btn archive-btn" id="archiveBtn">結束歸檔</button>
    </div>
  </div>
</div>

<div id="addModal" class="modal">
  <div class="modal-content">
    <h3>新增代號</h3>
    <input type="text" id="newCodeInput" placeholder="輸入名稱" maxlength="6">
    <button id="confirmAddBtn" style="padding:10px 20px; background:#f39a18; color:white; border:none; border-radius:5px;">確定</button>
    <button onclick="closeModal()" style="padding:10px 20px; background:#ccc; border:none; border-radius:5px; margin-left:10px;">取消</button>
  </div>
